x-envoy-common:
  environment: &common-env
    DATABASE_URL: "postgresql+asyncpg://test_user:test_pwd@envoy-db/test_db"
    CERT_HEADER: x-forwarded-client-cert
    ENABLE_NOTIFICATIONS: "True"
    ALLOW_DEVICE_REGISTRATION: "True"
    NMI_VALIDATION_ENABLED: "True"
    NMI_VALIDATION_PARTICIPANT_ID: "ENERGYAP"

services:
  tls-termination:
    build:
      context: ./tls-termination/
      args:
        HOST_UID: "${HOST_UID}"
        HOST_GID: "${HOST_GID}"
    ports:
      - 127.0.0.1:8443:443
    networks:
      - envoy-net
    volumes:
      - certificates:/test_certs/
    depends_on:
      - envoy
      - envoy-admin
    healthcheck:
      test: service nginx status || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s


  envoy:
    image: envoy:latest
    ports:
      - 127.0.0.1:8000:8000
    restart: unless-stopped
    networks:
      - envoy-net
    environment:
      <<: *common-env
      PORT: 8000
      APP_MODULE: envoy.server.main:app
    depends_on:
      envoy-db:
        condition: service_started

  envoy-admin:
    image: envoy:latest
    ports:
      - 127.0.0.1:8001:8001
    restart: unless-stopped
    networks:
      - envoy-net
    environment:
      <<: *common-env
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: password
      PORT: 8001
      APP_MODULE: envoy.admin.main:app
    depends_on:
      envoy-db:
        condition: service_started

  envoy-db:
    image: postgres:16
    ports:
      - 127.0.0.1:8003:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    networks:
      - envoy-net
    environment:
      - POSTGRES_USER=test_user
      - POSTGRES_PASSWORD=test_pwd
      - POSTGRES_DB=test_db
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "test_user", "-d", "test_db" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  envoy-db_init:
    build:
      context: ./db-init/
    working_dir: /app/src/envoy/server/
    environment:
      <<: *common-env
    volumes:
      - certificates:/test_certs/
    networks:
      - envoy-net
    depends_on:
      envoy-db:
        condition: service_healthy
      tls-termination:
        condition: service_healthy


networks:
  envoy-net:


volumes:
  postgres_data:
  certificates:
    driver: local
    driver_opts:
      type: none
      device: "${PWD}/tls-termination/test_certs/"
      o: bind
